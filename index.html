<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위탁 스코어러 · 소싱 콘솔</title>
<style>
  :root{
    --ink:#12130f;
    --paper:#f0ede3;
    --paper-2:#e6e2d4;
    --line:#c9c4b2;
    --signal:#1f5c3d;       /* 딥 그린 = 통과 */
    --signal-soft:#e2ecdf;
    --warn:#b6552a;         /* 클레이 = 경고 */
    --dim:#6a6858;
    --hi:#d8ff3e;           /* 형광 라임 = 강조 액센트 */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Helvetica Neue',-apple-system,'Segoe UI',sans-serif;
    background:var(--paper);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;
  }
  button{font-family:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  /* Header */
  header{border-bottom:2px solid var(--ink);padding:18px 0}
  .brandline{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .brand{font-size:13px;letter-spacing:.32em;text-transform:uppercase;font-weight:800}
  .mock-tag{font-size:11px;letter-spacing:.1em;padding:4px 10px;border:1px solid var(--line);border-radius:99px;color:var(--dim)}
  .mock-tag.live{color:var(--signal);border-color:var(--signal)}

  /* Layout */
  .layout{display:grid;grid-template-columns:1fr 292px;gap:24px;margin-top:22px;padding-bottom:70px}
  @media(max-width:920px){.layout{grid-template-columns:1fr}}

  /* Category chips */
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .cat{
    background:none;border:1px solid var(--line);color:var(--dim);cursor:pointer;
    font-weight:700;font-size:13px;padding:8px 16px;border-radius:99px;transition:all .12s;
  }
  .cat:hover{border-color:var(--ink);color:var(--ink)}
  .cat.on{background:var(--ink);color:var(--hi);border-color:var(--ink)}

  /* Card */
  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .card-h{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .card-h .t{font-size:13px;letter-spacing:.1em;text-transform:uppercase;font-weight:800}
  .card-h .sub{font-size:12px;color:var(--dim)}
  .card-actions{display:flex;gap:8px}
  .act-btn{
    background:none;border:1px solid var(--ink);color:var(--ink);cursor:pointer;
    font-size:12px;font-weight:700;padding:6px 13px;border-radius:8px;letter-spacing:.03em;
  }
  .act-btn:hover{background:var(--ink);color:var(--hi)}
  .act-btn:disabled{opacity:.35;cursor:default}
  .act-btn:disabled:hover{background:none;color:var(--ink)}

  /* Table */
  .row{
    display:grid;grid-template-columns:42px 1fr 104px 72px 64px 92px;gap:12px;align-items:center;
    padding:13px 16px;border-bottom:1px solid var(--line);
  }
  .row:last-of-type{border-bottom:none}
  .row.head{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);font-weight:700;border-bottom:2px solid var(--ink);padding-top:11px;padding-bottom:11px}
  @media(max-width:760px){
    .row{grid-template-columns:34px 1fr 84px}
    .row .col-hide{display:none}
  }
  .row.clickable{cursor:pointer}
  .row.clickable:hover{background:rgba(18,19,15,.04)}
  .rank{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--dim)}
  .rank.top{color:var(--signal)}
  .kw{font-weight:700;font-size:15px}
  .kw .meta{display:block;font-size:11.5px;color:var(--dim);font-weight:400;margin-top:1px}
  .kw .via{color:var(--signal);font-weight:700}
  .num{font-variant-numeric:tabular-nums;font-size:14px}
  .comp-badge{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block}
  .comp-낮음{background:var(--signal-soft);color:var(--signal)}
  .comp-중간{background:#f0e9d6;color:#8a7523}
  .comp-높음{background:#f3e0d6;color:var(--warn)}
  .tr-up{color:var(--signal);font-weight:800}
  .tr-dn{color:var(--warn);font-weight:800}
  .tr-fl{color:var(--dim)}

  .score-cell{text-align:right}
  .score-num{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .verdict{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:3px}
  .v-pass{color:var(--signal)}
  .v-hold{color:#8a7523}
  .v-skip{color:var(--warn)}
  .chk-badge{font-size:11px;font-weight:700;color:var(--signal)}

  /* Pagination */
  .pager{display:flex;gap:6px;justify-content:center;align-items:center;padding:14px;border-top:1px solid var(--line)}
  .pg{
    background:none;border:1px solid var(--line);color:var(--dim);cursor:pointer;
    font-weight:700;font-size:13px;min-width:34px;padding:6px 10px;border-radius:8px;
  }
  .pg:hover{border-color:var(--ink);color:var(--ink)}
  .pg.on{background:var(--ink);color:var(--hi);border-color:var(--ink)}
  .pg:disabled{opacity:.3;cursor:default}

  .empty{color:var(--dim);text-align:center;padding:56px 20px;font-size:14px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--signal);border-radius:99px;animation:sp .8s linear infinite;vertical-align:-2px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* Trending aside */
  .aside .card{position:sticky;top:16px}
  .trend-list{list-style:none}
  .trend-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--line)}
  .trend-item:last-child{border-bottom:none}
  .t-rank{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--dim);width:20px;text-align:center}
  .trend-item:nth-child(-n+3) .t-rank{color:var(--warn)}
  .t-kw{font-weight:700;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .t-vol{font-size:11.5px;color:var(--dim);font-variant-numeric:tabular-nums}

  .foot{font-size:12px;color:var(--dim);border-top:1px solid var(--line);padding:16px 0;text-align:center}

  /* 2차 검증 체크리스트 */
  .chk-panel{border-bottom:1px solid var(--line);background:rgba(18,19,15,.03);padding:14px 18px 16px 56px;font-size:13px}
  .chk-panel h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
  .chk-item{display:flex;gap:9px;align-items:center;padding:3px 0;cursor:pointer}
  .chk-item input{accent-color:var(--signal);width:15px;height:15px}
  .chk-item.done{color:var(--dim);text-decoration:line-through}
  .chk-memo{margin-top:10px}
  .chk-memo label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);font-weight:700;display:block;margin-bottom:4px}
  .chk-memo textarea{
    width:100%;min-height:48px;resize:vertical;padding:10px;border:1px solid var(--line);
    border-radius:8px;font-size:12px;background:var(--paper);color:var(--ink);font-family:inherit;
  }
  .chk-memo textarea:focus{outline:2px solid var(--signal);outline-offset:1px}

  /* 로그인 게이트 */
  .gate{position:fixed;inset:0;background:var(--paper);z-index:99;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate.off{display:none}
  .gate-box{width:100%;max-width:380px;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:34px 28px}
  .gate-box .brand{margin-bottom:18px;font-size:12px}
  .gate-box h2{font-size:24px;font-weight:800;letter-spacing:-.01em;margin-bottom:6px}
  .gate-box p{font-size:13px;color:var(--dim);margin-bottom:18px}
  .gate-box input{
    width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:10px;
    font-size:16px;background:var(--paper);color:var(--ink);letter-spacing:.2em;
  }
  .gate-box input:focus{outline:2px solid var(--signal);outline-offset:1px}
  .gate-box .run{
    width:100%;justify-content:center;margin-top:14px;background:var(--ink);color:var(--hi);
    border:none;cursor:pointer;font-weight:800;font-size:15px;padding:14px;border-radius:10px;
    display:inline-flex;align-items:center;gap:10px;
  }
  .gate-box .run:disabled{opacity:.5}
  .gate-box .dot{width:8px;height:8px;background:var(--hi);border-radius:99px}
  .gate-err{font-size:13px;color:var(--warn);font-weight:700;margin-top:12px;min-height:20px}
</style>
</head>
<body>
<div id="gate" class="gate">
  <div class="gate-box">
    <div class="brand">위탁 스코어러 · Sourcing Console</div>
    <h2>비밀번호 입력</h2>
    <p>등록된 사용자만 이용할 수 있습니다.</p>
    <input type="password" id="gatePw" placeholder="••••••" autocomplete="current-password">
    <button class="run" id="gateBtn"><span class="dot"></span> 입장</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="brandline">
      <div class="brand">위탁 스코어러 · Sourcing Console</div>
      <div id="mockTag" class="mock-tag">데이터 소스 확인 중…</div>
    </div>
  </header>

  <div class="layout">
    <div class="main">
      <div class="cats" id="cats"></div>
      <div class="card">
        <div class="card-h">
          <div>
            <div class="t" id="catTitle">등록 후보 랭킹</div>
            <div class="sub" id="catSub"></div>
          </div>
          <div class="card-actions">
            <button class="act-btn" id="csvBtn" disabled>CSV</button>
            <button class="act-btn" id="reloadBtn">새로 조회</button>
          </div>
        </div>
        <div id="tblBody"><div class="empty">불러오는 중…</div></div>
        <div class="pager" id="pager" style="display:none"></div>
      </div>
    </div>

    <div class="aside">
      <div class="card">
        <div class="card-h">
          <div>
            <div class="t">오늘의 인기 검색어</div>
            <div class="sub" id="trendSub">카테고리 전체 · 하루 1회 갱신</div>
          </div>
        </div>
        <ol class="trend-list" id="trendList">
          <div class="empty" style="padding:32px 16px">불러오는 중…</div>
        </ol>
      </div>
    </div>
  </div>

  <div class="foot">점수는 상대 판단용 참고치입니다. 행을 클릭하면 2차 검증 체크리스트가 열립니다 — 등록 전 반드시 셀러 강도·공급처 위탁가를 확인하세요.</div>
</div>

<script>
const $ = s => document.querySelector(s);
// API 자동 감지: 로컬 FastAPI(uvicorn)면 same-origin, 그 외는 배포된 Supabase API
const LOCAL = ['localhost','127.0.0.1'].includes(location.hostname);
const API = LOCAL ? '' : 'https://psrwoakxiomlxubxmcyr.supabase.co/functions/v1/scorer';
const PAGE_SIZE = 10;
const FETCH_LIMIT = 50; // 카테고리당 조회 후보 수 (5페이지)
const FALLBACK_CATS = ['캠핑/아웃도어','주방','반려동물','유아/키즈','차량용품','생활/수납','디지털 소품','뷰티/헬스'];

function fmt(n){ return Number(n).toLocaleString('ko-KR'); }
function gateKeyVal(){ return localStorage.getItem('gateKey')||''; }

// ---- 캐시 (localStorage) — 재방문 시 API 호출 없이 이전 데이터 사용 ----
function catCache(){ try{ return JSON.parse(localStorage.getItem('wetak-cats-v1'))||{}; }catch(e){ return {}; } }
function catCacheGet(cat){ return catCache()[cat]||null; }
function catCacheSet(cat, entry){
  const s=catCache(); s[cat]=entry;
  try{ localStorage.setItem('wetak-cats-v1', JSON.stringify(s)); }catch(e){}
}

// ---- 공통 API 호출 (게이트 401 처리) ----
function onUnauthorized(){
  localStorage.removeItem('gateKey');
  $('#gate').classList.remove('off');
  gateError('비밀번호를 다시 입력해 주세요.');
}
async function apiPost(path, payload){
  const res=await fetch(API+path,{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Gate-Key':gateKeyVal()},
    body:JSON.stringify(payload),
  });
  if(res.status===401){ onUnauthorized(); throw new Error('비밀번호 인증이 필요합니다.'); }
  return res;
}
async function apiGet(path){
  const res=await fetch(API+path,{headers:{'X-Gate-Key':gateKeyVal()}});
  if(res.status===401){ onUnauthorized(); throw new Error('비밀번호 인증이 필요합니다.'); }
  return res;
}

// ---- 상태 태그 ----
fetch(API+'/api/status').then(r=>r.json()).then(d=>{
  const t=$('#mockTag');
  if(d.mock_mode){ t.textContent='● 목업 데이터 (API 키 미설정)'; }
  else{
    t.textContent = d.trend_mock ? '● 네이버 API 실시간' : '● 네이버 API 실시간 · 트렌드 자동';
    t.classList.add('live');
  }
}).catch(()=>{ $('#mockTag').textContent='● 서버 연결 실패'; });

// ---- 로그인 게이트 ----
async function verifyKey(key){
  try{
    const r=await fetch(API+'/api/verify',{headers:{'X-Gate-Key':key}});
    return r.ok;
  }catch(e){ return null; }
}
function gateError(msg){ $('#gateErr').textContent=msg; }
let booted=false;
function openDashboard(){
  $('#gate').classList.add('off');
  if(!booted){ booted=true; boot(); }
}
async function submitGate(){
  const pw=$('#gatePw').value;
  const btn=$('#gateBtn'); btn.disabled=true;
  const ok=await verifyKey(pw);
  btn.disabled=false;
  if(ok){ localStorage.setItem('gateKey', pw); openDashboard(); }
  else if(ok===null){ gateError('서버에 연결할 수 없습니다. 잠시 후 다시 시도하세요.'); }
  else{ gateError('비밀번호가 맞지 않습니다.'); $('#gatePw').select(); }
}
$('#gateBtn').addEventListener('click', submitGate);
$('#gatePw').addEventListener('keydown', e=>{ if(e.key==='Enter') submitGate(); });
(async ()=>{
  const ok=await verifyKey(gateKeyVal());
  if(ok){ openDashboard(); }
  else{ if(ok===null) gateError('서버에 연결할 수 없습니다.'); $('#gatePw').focus(); }
})();

// ---- 판정 ----
function verdict(score, comp){
  if(score>=62 && comp!=='높음') return ['통과','v-pass'];
  if(score>=45) return ['보류','v-hold'];
  return ['제외','v-skip'];
}
function rowVerdict(r){
  let [vtxt,vcls]=verdict(r.total_score,r.competition);
  if(r.supply && r.supply.matched===0){ vtxt='위탁불가'; vcls='v-skip'; }
  return [vtxt,vcls];
}
function trendMark(t){
  if(t==null) return '<span class="tr-fl">–</span>';
  if(t>=0.6) return '<span class="tr-up">▲</span>';
  if(t<=0.4) return '<span class="tr-dn">▼</span>';
  return '<span class="tr-fl">–</span>';
}

// ---- 2차 검증 체크리스트 ----
const CHK_ITEMS=[
  '네이버쇼핑 1페이지 셀러 강도 확인 (대형셀러·최저가 경쟁 여부)',
  '공급처에서 실제 위탁 가능 여부·공급가 대조',
  '배송비·배송기간 확인',
  '시즌·재고 리스크 확인',
  '스토어 등록 완료',
];
function chkLoad(){ try{ return JSON.parse(localStorage.getItem('wetak-checks'))||{}; }catch(e){ return {}; } }
function chkSave(s){ localStorage.setItem('wetak-checks', JSON.stringify(s)); }
function chkOf(kw){ const s=chkLoad(); return s[kw]||{c:[false,false,false,false,false],m:''}; }
function chkCount(kw){ return chkOf(kw).c.filter(Boolean).length; }

// ---- 카테고리 랭킹 ----
let CATS=FALLBACK_CATS.slice();
let curCat=null, curPage=1, curData=null;

function renderChips(){
  $('#cats').innerHTML=CATS.map(c=>`<button class="cat ${c===curCat?'on':''}" data-c="${c}">${c}</button>`).join('');
}
$('#cats').addEventListener('click', e=>{
  const b=e.target.closest('.cat');
  if(b && b.dataset.c!==curCat) selectCat(b.dataset.c);
});

async function selectCat(cat, force=false){
  curCat=cat; curPage=1;
  localStorage.setItem('wetak-lastcat', cat);
  renderChips();
  $('#catTitle').textContent=`등록 후보 랭킹 — ${cat}`;

  const cached=catCacheGet(cat);
  if(cached && !force){ curData=cached.data; renderTable(cached.ts); return; }

  // 조회한 적 없는 카테고리만 자동 조회 (쿼터 절약)
  curData=null;
  $('#csvBtn').disabled=true;
  $('#pager').style.display='none';
  $('#catSub').textContent='';
  $('#tblBody').innerHTML='<div class="empty"><span class="spin"></span>네이버 연관 키워드를 스캔하고 있습니다… (수십 초 걸릴 수 있음)</div>';
  try{
    const res=await apiPost('/api/discover',{category:cat, limit:FETCH_LIMIT});
    const data=await res.json();
    if(!res.ok||data.error) throw new Error(data.error||('HTTP '+res.status));
    const entry={ts:Date.now(), data};
    catCacheSet(cat, entry);
    if(curCat!==cat) return; // 그 사이 다른 카테고리로 이동한 경우
    curData=data; renderTable(entry.ts);
  }catch(e){
    if(curCat!==cat) return;
    $('#tblBody').innerHTML=`<div class="empty">조회 실패: ${e.message}<br><br>우측 상단 "새로 조회"로 다시 시도하세요.</div>`;
  }
}

function renderTable(ts){
  const d=curData;
  $('#csvBtn').disabled=!(d&&d.results.length);
  const when=new Date(ts);
  const pad=n=>String(n).padStart(2,'0');
  $('#catSub').textContent=`${fmt(d.scanned)}개 스캔 → ${d.count}개 선별 · ${d.mock?'목업':'실데이터'} · 갱신 ${pad(when.getMonth()+1)}.${pad(when.getDate())} ${pad(when.getHours())}:${pad(when.getMinutes())}`;
  if(!d.results.length){
    $('#tblBody').innerHTML='<div class="empty">조건에 맞는 후보가 없습니다.</div>';
    $('#pager').style.display='none';
    return;
  }
  const start=(curPage-1)*PAGE_SIZE;
  const rows=d.results.slice(start, start+PAGE_SIZE);
  let html=`<div class="row head">
    <div>#</div><div>키워드</div>
    <div class="col-hide">월 검색량</div>
    <div class="col-hide">경쟁</div>
    <div class="col-hide">트렌드</div>
    <div class="score-cell">점수</div></div>`;
  rows.forEach((r,j)=>{
    const i=start+j;
    const [vtxt,vcls]=rowVerdict(r);
    let metaTxt=`PC ${fmt(r.pc)} · 모바일 ${fmt(r.mobile)}`;
    if(r.via) metaTxt+=` · <span class="via">←${r.via}</span>`;
    const done=chkCount(r.keyword);
    if(done) metaTxt+=` · <span class="chk-badge">검증 ${done}/${CHK_ITEMS.length}</span>`;
    html+=`<div class="row clickable" data-i="${i}" title="클릭하면 2차 검증 체크리스트가 열립니다">
      <div class="rank ${i===0?'top':''}">${i+1}</div>
      <div class="kw">${r.keyword}<span class="meta">${metaTxt}</span></div>
      <div class="num col-hide">${fmt(r.search_volume)}</div>
      <div class="col-hide"><span class="comp-badge comp-${r.competition}">${r.competition}</span></div>
      <div class="col-hide" style="text-align:center;font-size:15px">${trendMark(r.scores.trend)}</div>
      <div class="score-cell">
        <div class="score-num">${r.total_score}</div>
        <div class="verdict ${vcls}">${vtxt}</div>
      </div>
    </div>`;
  });
  $('#tblBody').innerHTML=html;
  renderPager();
}

function renderPager(){
  const total=Math.ceil(curData.results.length/PAGE_SIZE);
  const p=$('#pager');
  if(total<=1){ p.style.display='none'; return; }
  p.style.display='';
  let html=`<button class="pg" id="pgPrev" ${curPage===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=total;i++) html+=`<button class="pg ${i===curPage?'on':''}" data-p="${i}">${i}</button>`;
  html+=`<button class="pg" id="pgNext" ${curPage===total?'disabled':''}>›</button>`;
  p.innerHTML=html;
}
$('#pager').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b||b.disabled) return;
  const total=Math.ceil(curData.results.length/PAGE_SIZE);
  if(b.id==='pgPrev') curPage=Math.max(1,curPage-1);
  else if(b.id==='pgNext') curPage=Math.min(total,curPage+1);
  else if(b.dataset.p) curPage=+b.dataset.p;
  const c=catCacheGet(curCat);
  renderTable(c?c.ts:Date.now());
});

$('#reloadBtn').addEventListener('click', ()=>{ if(curCat) selectCat(curCat, true); });

// ---- 체크리스트 패널 (행 클릭) ----
$('#tblBody').addEventListener('click', e=>{
  const row=e.target.closest('.row.clickable');
  if(!row || e.target.closest('.chk-panel')) return;
  const next=row.nextElementSibling;
  if(next && next.classList.contains('chk-panel')){ next.remove(); return; }
  document.querySelectorAll('.chk-panel').forEach(p=>p.remove());
  const r=curData.results[+row.dataset.i];
  const st=chkOf(r.keyword);
  const panel=document.createElement('div');
  panel.className='chk-panel';
  panel.innerHTML=`<h3>2차 검증 — ${r.keyword}</h3>`+
    CHK_ITEMS.map((t,j)=>`<label class="chk-item ${st.c[j]?'done':''}"><input type="checkbox" data-j="${j}" ${st.c[j]?'checked':''}> ${t}</label>`).join('')+
    `<div class="chk-memo"><label>실판매 기록 (판매량·전환 메모)</label>
     <textarea placeholder="예) 7/25 등록, 첫 주 노출 120·클릭 9·판매 2">${st.m||''}</textarea></div>`;
  const save=()=>{
    const s=chkLoad(); const cur=s[r.keyword]||{c:[false,false,false,false,false],m:''};
    panel.querySelectorAll('input[type=checkbox]').forEach(cb=>{ cur.c[+cb.dataset.j]=cb.checked; });
    cur.m=panel.querySelector('textarea').value;
    s[r.keyword]=cur; chkSave(s);
  };
  panel.addEventListener('change', ev=>{
    if(ev.target.matches('input[type=checkbox]'))
      ev.target.closest('.chk-item').classList.toggle('done', ev.target.checked);
    save();
  });
  panel.querySelector('textarea').addEventListener('input', save);
  row.after(panel);
});

// ---- CSV ----
function csvCell(v){ return `"${String(v??'').replace(/"/g,'""')}"`; }
$('#csvBtn').addEventListener('click', ()=>{
  if(!curData||!curData.results.length) return;
  const head=['순위','키워드','연관출처','월검색량','PC','모바일','경쟁','점수_검색량','점수_경쟁','점수_트렌드','총점','판정','검증진행','실판매메모'];
  const rows=curData.results.map((r,i)=>{
    const [vtxt]=rowVerdict(r);
    const st=chkOf(r.keyword);
    return [
      i+1, r.keyword, r.via||'', r.search_volume, r.pc, r.mobile, r.competition,
      r.scores.volume, r.scores.competition, r.scores.trend,
      r.total_score, vtxt, `${st.c.filter(Boolean).length}/${CHK_ITEMS.length}`, st.m||'',
    ].map(csvCell).join(',');
  });
  const csv='﻿'+head.map(csvCell).join(',')+'\n'+rows.join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  const d=new Date(), pad=n=>String(n).padStart(2,'0');
  a.download=`위탁스코어러_${(curCat||'').replace(/\//g,'-')}_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
});

// ---- 오늘의 인기 검색어 (하루 1회) ----
async function loadTrending(){
  const today=new Date().toISOString().slice(0,10);
  let cached=null;
  try{ cached=JSON.parse(localStorage.getItem('wetak-trend-v1')); }catch(e){}
  if(cached && cached.date===today && cached.top){ renderTrending(cached); return; }
  try{
    const res=await apiGet('/api/trending');
    const d=await res.json();
    if(!res.ok||d.error) throw new Error(d.error||('HTTP '+res.status));
    const entry={date:today, top:d.top, mock:d.mock};
    localStorage.setItem('wetak-trend-v1', JSON.stringify(entry));
    renderTrending(entry);
  }catch(e){
    if(cached && cached.top){ renderTrending(cached); return; } // 어제 데이터라도 표시
    $('#trendList').innerHTML=`<div class="empty" style="padding:32px 16px">조회 실패</div>`;
  }
}
function renderTrending(entry){
  $('#trendSub').textContent=`${entry.date} 기준 · ${entry.mock?'목업':'실데이터'}`;
  $('#trendList').innerHTML=entry.top.map((t,i)=>`
    <li class="trend-item">
      <span class="t-rank">${i+1}</span>
      <span class="t-kw">${t.keyword}</span>
      <span class="t-vol">${fmt(t.volume)}</span>
    </li>`).join('');
}

// ---- 부팅: 게이트 통과 후 1회 ----
async function boot(){
  try{
    const r=await fetch(API+'/api/categories');
    const d=await r.json();
    if(d.categories && d.categories.length) CATS=d.categories;
  }catch(e){}
  const last=localStorage.getItem('wetak-lastcat');
  loadTrending();
  selectCat(CATS.includes(last)?last:CATS[0]);
}
</script>
