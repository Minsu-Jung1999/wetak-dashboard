<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제철 레이더 · 위탁 스코어러</title>
<style>
  :root{
    --ink:#12130f; --paper:#f0ede3; --paper-2:#e6e2d4; --line:#c9c4b2;
    --signal:#1f5c3d; --signal-soft:#e2ecdf; --warn:#b6552a; --dim:#6a6858; --hi:#d8ff3e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Helvetica Neue',-apple-system,'Segoe UI',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}
  header{border-bottom:2px solid var(--ink);padding:18px 0}
  .brandline{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .brand{font-size:13px;letter-spacing:.32em;text-transform:uppercase;font-weight:800}
  .nav{display:flex;gap:6px}
  .nav a{font-size:13px;font-weight:700;color:var(--dim);text-decoration:none;padding:7px 14px;border-radius:99px;border:1px solid transparent}
  .nav a:hover{color:var(--ink);border-color:var(--line)}
  .nav a.on{background:var(--ink);color:var(--hi)}

  .main{margin-top:22px;padding-bottom:70px}
  .sec-h{display:flex;justify-content:space-between;align-items:baseline;margin:26px 0 12px;flex-wrap:wrap;gap:8px}
  .sec-h h2{font-size:17px;font-weight:800;letter-spacing:-.01em}
  .sec-h h2 em{font-style:normal;color:var(--warn)}
  .sec-h .sub{font-size:12px;color:var(--dim)}
  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;overflow:hidden}

  .row{display:grid;grid-template-columns:1fr 96px 84px 64px 96px 96px 90px;gap:10px;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line)}
  .row:last-of-type{border-bottom:none}
  .row.head{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);font-weight:700;border-bottom:2px solid var(--ink)}
  @media(max-width:820px){
    .row{grid-template-columns:1fr 84px 64px}
    .row .col-hide{display:none}
  }
  .row.clickable{cursor:pointer}
  .row.clickable:hover{background:rgba(18,19,15,.04)}
  .kw{font-weight:700;font-size:15px}
  .kw .meta{display:block;font-size:11.5px;color:var(--dim);font-weight:400;margin-top:1px}
  .type-badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:7px;vertical-align:1px}
  .type-과일{background:#f3e0d6;color:var(--warn)}
  .type-채소{background:var(--signal-soft);color:var(--signal)}
  .num{font-variant-numeric:tabular-nums;font-size:13.5px}
  .comp-badge{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block}
  .comp-낮음{background:var(--signal-soft);color:var(--signal)}
  .comp-중간{background:#f0e9d6;color:#8a7523}
  .comp-높음{background:#f3e0d6;color:var(--warn)}
  .tr-up{color:var(--signal);font-weight:800}
  .tr-dn{color:var(--warn);font-weight:800}
  .tr-fl{color:var(--dim)}
  .margin-val{font-weight:800;color:var(--signal)}
  .margin-neg{color:var(--warn)}

  /* 확장 패널: 마진 계산기 */
  .calc-panel{border-bottom:1px solid var(--line);background:rgba(18,19,15,.03);padding:16px 18px;font-size:13px}
  .calc-grid{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
  .calc-grid label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);font-weight:700;display:block;margin-bottom:4px}
  .calc-grid input{width:130px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--paper);color:var(--ink);font-variant-numeric:tabular-nums}
  .calc-grid input:focus{outline:2px solid var(--signal);outline-offset:1px}
  .calc-result{font-size:15px;font-weight:800;min-width:120px}
  .calc-note{font-size:11.5px;color:var(--dim);margin-top:10px}
  .lnk{display:inline-block;font-size:11px;font-weight:700;color:var(--signal);border:1px solid var(--signal);border-radius:6px;padding:3px 10px;text-decoration:none;margin-right:6px}
  .lnk:hover{background:var(--signal);color:#fff}
  .lnk.dark{color:var(--ink);border-color:var(--ink)}
  .lnk.dark:hover{background:var(--ink);color:var(--hi)}

  .mock-tag{font-size:11px;letter-spacing:.1em;padding:4px 10px;border:1px solid var(--line);border-radius:99px;color:var(--dim)}
  .mock-tag.live{color:var(--signal);border-color:var(--signal)}
  .empty{color:var(--dim);text-align:center;padding:56px 20px;font-size:14px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--signal);border-radius:99px;animation:sp .8s linear infinite;vertical-align:-2px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .foot{font-size:12px;color:var(--dim);border-top:1px solid var(--line);padding:16px 0;text-align:center}
  .act-btn{background:none;border:1px solid var(--ink);color:var(--ink);cursor:pointer;font-size:12px;font-weight:700;padding:6px 13px;border-radius:8px}
  .act-btn:hover{background:var(--ink);color:var(--hi)}

  /* 게이트 */
  .gate{position:fixed;inset:0;background:var(--paper);z-index:99;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate.off{display:none}
  .gate-box{width:100%;max-width:380px;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:34px 28px}
  .gate-box .brand{margin-bottom:18px;font-size:12px}
  .gate-box h2{font-size:24px;font-weight:800;margin-bottom:6px}
  .gate-box p{font-size:13px;color:var(--dim);margin-bottom:18px}
  .gate-box input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:var(--paper);color:var(--ink);letter-spacing:.2em}
  .gate-box .run{width:100%;justify-content:center;margin-top:14px;background:var(--ink);color:var(--hi);border:none;cursor:pointer;font-weight:800;font-size:15px;padding:14px;border-radius:10px;display:inline-flex;align-items:center;gap:10px}
  .gate-box .dot{width:8px;height:8px;background:var(--hi);border-radius:99px}
  .gate-err{font-size:13px;color:var(--warn);font-weight:700;margin-top:12px;min-height:20px}
</style>
</head>
<body>
<div id="gate" class="gate">
  <div class="gate-box">
    <div class="brand">위탁 스코어러 · Sourcing Console</div>
    <h2>비밀번호 입력</h2>
    <p>등록된 사용자만 이용할 수 있습니다.</p>
    <input type="password" id="gatePw" placeholder="••••••" autocomplete="current-password">
    <button class="run" id="gateBtn"><span class="dot"></span> 입장</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="brandline">
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div class="brand">위탁 스코어러</div>
        <nav class="nav">
          <a href="./">대시보드</a>
          <a href="seasonal.html" class="on">제철 레이더</a>
          <a href="sourcing.html">소싱처</a>
          <a href="board.html">운영 보드</a>
        </nav>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <div id="mockTag" class="mock-tag">확인 중…</div>
        <button class="act-btn" id="reloadBtn">새로 조회</button>
      </div>
    </div>
  </header>

  <div class="main">
    <div class="sec-h">
      <h2>지금 제철 — <em id="curMonth"></em>월</h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="act-btn" id="pasteBtn" title="tools/coupang_prices.py로 수집한 JSON을 붙여넣어 쿠팡 최저가를 일괄 반영">쿠팡가 붙여넣기</button>
        <a id="bmk" href="#" style="color:var(--signal);font-weight:700;font-size:12px" title="이 링크를 북마크바로 드래그해 두고 쿠팡 검색 결과에서 누르면 최저가가 자동 입력됩니다">📌 북마클릿</a>
      </div>
    </div>
    <div class="card"><div id="curBody"><div class="empty"><span class="spin"></span>불러오는 중…</div></div></div>

    <div class="sec-h">
      <h2>다음 달 예고 — <em id="nextMonth"></em>월 시작</h2>
      <span class="sub">남들보다 먼저 진입할 수 있는 품목 (영상 전략: 선진입)</span>
    </div>
    <div class="card"><div id="nextBody"><div class="empty">불러오는 중…</div></div></div>
  </div>

  <div class="foot">도매시세(KAMIS)는 공급가 협상 기준선입니다 — 실제 위탁 공급가는 공급처 컨택으로 확정하세요. 쿠팡 수수료 10.8% 기준.</div>
</div>

<script>
const $ = s => document.querySelector(s);
const LOCAL = ['localhost','127.0.0.1'].includes(location.hostname);
const API = LOCAL ? '' : 'https://psrwoakxiomlxubxmcyr.supabase.co/functions/v1/scorer';
const COUPANG_FEE = 0.108;

function fmt(n){ return Number(n).toLocaleString('ko-KR'); }
function gateKeyVal(){ return localStorage.getItem('gateKey')||''; }
function todayStr(){ const d=new Date(),p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function coupangUrl(kw){ return 'https://www.coupang.com/np/search?q='+encodeURIComponent(kw); }

async function apiGet(path){
  const res=await fetch(API+path,{headers:{'X-Gate-Key':gateKeyVal()}});
  if(res.status===401){ localStorage.removeItem('gateKey'); $('#gate').classList.remove('off'); gateError('비밀번호를 다시 입력해 주세요.'); throw new Error('auth'); }
  return res;
}

// ---- 게이트 (index와 동일 패턴) ----
async function verifyKey(key){
  try{ const r=await fetch(API+'/api/verify',{headers:{'X-Gate-Key':key}}); return r.ok; }catch(e){ return null; }
}
function gateError(m){ $('#gateErr').textContent=m; }
let booted=false;
function openDashboard(){ $('#gate').classList.add('off'); if(!booted){ booted=true; boot(); } }
async function submitGate(){
  const pw=$('#gatePw').value, btn=$('#gateBtn'); btn.disabled=true;
  const ok=await verifyKey(pw); btn.disabled=false;
  if(ok){ localStorage.setItem('gateKey',pw); openDashboard(); }
  else if(ok===null){ gateError('서버에 연결할 수 없습니다.'); }
  else{ gateError('비밀번호가 맞지 않습니다.'); $('#gatePw').select(); }
}
$('#gateBtn').addEventListener('click',submitGate);
$('#gatePw').addEventListener('keydown',e=>{ if(e.key==='Enter') submitGate(); });
// 저장된 키가 있으면 깜빡임 없이 즉시 열고, 검증은 백그라운드에서 (틀리면 API 401이 잡음)
if(gateKeyVal()){
  openDashboard();
  verifyKey(gateKeyVal()).then(ok=>{ if(ok===false){ localStorage.removeItem('gateKey'); $('#gate').classList.remove('off'); gateError('비밀번호를 다시 입력해 주세요.'); $('#gatePw').focus(); } });
}else{ $('#gatePw').focus(); }

// ---- 상태 태그 ----
fetch(API+'/api/status').then(r=>r.json()).then(d=>{
  const t=$('#mockTag');
  if(d.mock_mode){ t.textContent='● 목업 데이터'; }
  else{ t.textContent='● 실데이터'; t.classList.add('live'); }
}).catch(()=>{ $('#mockTag').textContent='● 서버 연결 실패'; });

// ---- 데이터 (일 1회 캐시) ----
let seasonData=null;
function priceStore(){ try{ return JSON.parse(localStorage.getItem('wetak-cprice-v1'))||{}; }catch(e){ return {}; } }
function priceOf(name){ const s=priceStore(); return s[name]||{}; }
function priceSet(name, patch){
  const s=priceStore(); s[name]={...(s[name]||{}), ...patch, date:todayStr()};
  localStorage.setItem('wetak-cprice-v1', JSON.stringify(s));
}

async function loadSeasonal(force=false){
  let cached=null;
  try{ cached=JSON.parse(localStorage.getItem('wetak-seasonal-v1')); }catch(e){}
  if(cached && cached.date===todayStr() && !force){ seasonData=cached.data; renderAll(); fetchCoupangPrices(); return; }
  $('#curBody').innerHTML='<div class="empty"><span class="spin"></span>검색량·트렌드·시세를 조회하고 있습니다… (수십 초 걸릴 수 있음)</div>';
  $('#nextBody').innerHTML='<div class="empty">대기 중…</div>';
  try{
    const res=await apiGet('/api/seasonal');
    const d=await res.json();
    if(!res.ok||d.error) throw new Error(d.error||('HTTP '+res.status));
    seasonData=d;
    localStorage.setItem('wetak-seasonal-v1', JSON.stringify({date:todayStr(), data:d}));
    renderAll();
    fetchCoupangPrices();
  }catch(e){
    if(e.message!=='auth') $('#curBody').innerHTML=`<div class="empty">조회 실패: ${e.message}</div>`;
  }
}
$('#reloadBtn').addEventListener('click',()=>loadSeasonal(true));

// 로컬 수집기(tools/coupang_prices.py)가 만든 JSON 붙여넣기 → 최저가 일괄 반영
$('#pasteBtn').addEventListener('click',async ()=>{
  let txt='';
  try{ txt=await navigator.clipboard.readText(); }catch(e){}
  txt=prompt('coupang_prices.py 결과 JSON을 붙여넣으세요:', txt||'');
  if(!txt) return;
  try{
    const d=JSON.parse(txt);
    const prices=d.prices||d;
    let n=0;
    for(const [name,val] of Object.entries(prices)){
      if(val){ priceSet(name,{auto:Number(val)}); n++; }
    }
    renderAll();
    alert(`${n}개 품목의 쿠팡 최저가를 반영했습니다.`);
  }catch(e){ alert('JSON 형식이 올바르지 않습니다: '+e.message); }
});

// 쿠팡 최저가: 일 1회, 순차 시도. 차단되면 즉시 중단 → 수동 입력만
let coupangBlocked=false;
async function fetchCoupangPrices(){
  if(!seasonData) return;
  const items=[...seasonData.current, ...seasonData.upcoming];
  for(const it of items){
    const p=priceOf(it.name);
    if(p.date===todayStr() && (p.auto!=null||p.manual!=null)) continue;
    if(coupangBlocked) break;
    try{
      const res=await apiGet('/api/coupang-price?q='+encodeURIComponent(it.name));
      const d=await res.json();
      if(d.blocked){ coupangBlocked=true; break; }
      if(d.min_price) priceSet(it.name,{auto:d.min_price});
      renderAll();
    }catch(e){ coupangBlocked=true; break; }
  }
}

// ---- 렌더 ----
function trendMark(t){
  if(t==null) return '<span class="tr-fl">–</span>';
  if(t>=0.25) return '<span class="tr-up">▲ 급상승</span>';
  if(t>=0.05) return '<span class="tr-up">▲</span>';
  if(t<=-0.15) return '<span class="tr-dn">▼</span>';
  return '<span class="tr-fl">–</span>';
}
function serverPriceOf(name){
  if(!seasonData) return null;
  const it=[...seasonData.current,...seasonData.upcoming].find(x=>x.name===name);
  return it && it.coupang_price!=null ? it.coupang_price : null;
}
function coupangPriceOf(name){
  const p=priceOf(name);
  // 우선순위: 수동 입력 > 서버(DB 수집기) > 로컬 자동 캐시
  if(p.manual!=null) return p.manual;
  const sv=serverPriceOf(name);
  if(sv!=null) return sv;
  return p.auto!=null?p.auto:null;
}
function marginOf(name, wholesale){
  const p=priceOf(name);
  const sell=p.sell!=null?p.sell:coupangPriceOf(name);
  const supply=p.supply!=null?p.supply:null;
  if(sell&&supply) return Math.round((sell*(1-COUPANG_FEE)-supply)/sell*1000)/10;
  return null;
}

function renderSection(list, elId){
  if(!list.length){ $('#'+elId).innerHTML='<div class="empty">해당 품목 없음</div>'; return; }
  const sorted=[...list].sort((a,b)=>(b.trend_slope??-9)-(a.trend_slope??-9));
  let html=`<div class="row head">
    <div>품목</div><div class="col-hide">월 검색량</div><div class="col-hide">경쟁</div><div>트렌드</div>
    <div class="col-hide">도매시세</div><div class="col-hide">쿠팡 최저가</div><div class="col-hide">내 마진</div></div>`;
  sorted.forEach((it,i)=>{
    const cp=coupangPriceOf(it.name);
    const mg=marginOf(it.name, it.wholesale);
    const p=priceOf(it.name);
    html+=`<div class="row clickable" data-name="${it.name}" data-sec="${elId}">
      <div class="kw">${it.name}<span class="type-badge type-${it.type}">${it.type}</span>
        <span class="meta">주산지 ${it.origins.join('·')}${it.ad_clicks?` · 광고클릭 ${fmt(it.ad_clicks)}/월`:''}</span></div>
      <div class="num col-hide">${it.search_volume!=null?fmt(it.search_volume):'—'}</div>
      <div class="col-hide">${it.competition?`<span class="comp-badge comp-${it.competition}">${it.competition}</span>`:'—'}</div>
      <div style="font-size:12px">${trendMark(it.trend_slope)}</div>
      <div class="num col-hide">${it.wholesale?fmt(it.wholesale)+'원/'+it.price_unit:'—'}</div>
      <div class="num col-hide">${cp?fmt(cp)+'원'+(p.manual!=null?'':(serverPriceOf(it.name)!=null?'<span style="color:var(--signal);font-size:10px"> 수집</span>':'<span style="color:var(--dim);font-size:10px"> 자동</span>')):'—'}</div>
      <div class="num col-hide">${mg!=null?`<span class="margin-val ${mg<0?'margin-neg':''}">${mg}%</span>`:'—'}</div>
    </div>`;
  });
  $('#'+elId).innerHTML=html;
}
function renderAll(){
  $('#curMonth').textContent=seasonData.month;
  $('#nextMonth').textContent=seasonData.next_month;
  renderSection(seasonData.current,'curBody');
  renderSection(seasonData.upcoming,'nextBody');
}

// ---- 행 클릭 → 마진 계산기 패널 ----
document.addEventListener('click', e=>{
  if(e.target.closest('a')||e.target.closest('.calc-panel')) return;
  const row=e.target.closest('.row.clickable');
  if(!row) return;
  const next=row.nextElementSibling;
  if(next && next.classList.contains('calc-panel')){ next.remove(); return; }
  document.querySelectorAll('.calc-panel').forEach(p=>p.remove());
  const name=row.dataset.name;
  const list=[...seasonData.current,...seasonData.upcoming];
  const it=list.find(x=>x.name===name);
  const p=priceOf(name);
  const panel=document.createElement('div');
  panel.className='calc-panel';
  panel.innerHTML=`
    <div class="calc-grid">
      <div><label>쿠팡 판매가 (원)</label><input type="number" id="cSell" value="${p.sell??coupangPriceOf(name)??''}" placeholder="쿠팡 확인 후 입력"></div>
      <div><label>위탁 공급가 (원)</label><input type="number" id="cSupply" value="${p.supply??''}" placeholder="공급처 확인 후 입력"></div>
      <div><label>마진 (수수료 10.8%)</label><div class="calc-result" id="cResult">—</div></div>
    </div>
    <div class="calc-note">도매시세 ${it.wholesale?fmt(it.wholesale)+'원/'+it.price_unit:'미확인'} · 소매시세 ${it.retail?fmt(it.retail)+'원/'+it.price_unit:'미확인'} — 협상 기준선으로 활용</div>
    <div style="margin-top:12px">
      <a class="lnk dark" href="${coupangUrl(name)}" target="_blank" rel="noopener">쿠팡에서 확인↗</a>
      <a class="lnk" href="sourcing.html?item=${encodeURIComponent(name)}">이 품목 소싱처 찾기 →</a>
      <button class="lnk" style="cursor:pointer;background:none" id="toBoard">＋ 운영 보드에 담기</button>
    </div>`;
  const recalc=()=>{
    const sell=+panel.querySelector('#cSell').value||null;
    const supply=+panel.querySelector('#cSupply').value||null;
    priceSet(name,{sell:sell,supply:supply,manual:sell});
    const el=panel.querySelector('#cResult');
    if(sell&&supply){
      const net=sell*(1-COUPANG_FEE)-supply;
      const mg=Math.round(net/sell*1000)/10;
      el.innerHTML=`<span class="${mg<0?'margin-neg':'margin-val'}">${mg}%</span> <span style="font-size:12px;color:var(--dim)">(개당 ${fmt(Math.round(net))}원)</span>`;
    }else el.textContent='—';
    // 테이블 갱신은 패널 닫을 때
  };
  panel.addEventListener('input',recalc);
  // 운영 보드에 담기 (현재 스냅샷을 meta로 전달)
  panel.querySelector('#toBoard').addEventListener('click',()=>{
    const pp=priceOf(name);
    const meta={
      search_volume:it.search_volume, trend_slope:it.trend_slope,
      coupang_price:coupangPriceOf(name), wholesale:it.wholesale,
      supply_price:pp.supply??null,
    };
    const b64=btoa(unescape(encodeURIComponent(JSON.stringify(meta))));
    location.href=`board.html?add=${encodeURIComponent(name)}&type=${encodeURIComponent(it.type)}&meta=${encodeURIComponent(b64)}`;
  });
  row.after(panel);
  recalc();
});

// ---- 북마클릿: 쿠팡 검색 결과에서 최저가를 이 페이지로 전송 ----
// (드래그해서 북마크바에 두고, 쿠팡 검색 페이지에서 클릭)
(function(){
  const code=`(function(){var q=new URLSearchParams(location.search).get('q')||'';`+
    `var ps=[];document.querySelectorAll('.price-value').forEach(function(e){`+
    `var n=parseInt(e.textContent.replace(/[^0-9]/g,''));if(n>=1000)ps.push(n)});`+
    `if(!ps.length){alert('가격을 찾지 못했습니다. 쿠팡 검색 결과 페이지에서 눌러주세요.');return}`+
    `var m=Math.min.apply(null,ps);`+
    `window.open('${location.origin}${location.pathname.replace(/[^/]*$/,'')}seasonal.html?cpk='+encodeURIComponent(q)+'&cpv='+m,'_blank')})();`;
  $('#bmk').setAttribute('href','javascript:'+encodeURIComponent(code));
  $('#bmk').addEventListener('click',e=>{ e.preventDefault(); alert('클릭이 아니라, 이 링크를 브라우저 북마크바로 드래그해서 저장한 뒤 쿠팡 검색 결과 페이지에서 눌러주세요.'); });
})();

// 북마클릿에서 전달된 가격 반영 (?cpk=키워드&cpv=가격)
function applyCapturedPrice(){
  const sp=new URLSearchParams(location.search);
  const kw=sp.get('cpk'), val=parseInt(sp.get('cpv'),10);
  if(kw && val>0){
    priceSet(kw,{manual:val, sell:val});
    history.replaceState(null,'',location.pathname);
    return kw;
  }
  return null;
}

async function boot(){
  const captured=applyCapturedPrice();
  await loadSeasonal();
  if(captured && seasonData){
    const list=[...seasonData.current,...seasonData.upcoming];
    if(list.some(x=>x.name===captured)) renderAll();
  }
}
</script>
